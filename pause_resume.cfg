[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
  PAUSE_BASE
  _TOOLHEAD_PARK_PAUSE_CANCEL



[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  ##### read extrude from  _TOOLHEAD_PARK_PAUSE_CANCEL  macro #####
  {% set extrude = printer['gcode_macro _TOOLHEAD_PARK_PAUSE_CANCEL'].extrude %}
  #### get VELOCITY parameter if specified ####
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
  {%else %}
    {% set get_params = "" %}
  {% endif %}
  ##### end of definitions #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    M83
    G1 E{extrude} F2100
    {% if printer.gcode_move.absolute_extrude |lower == 'true' %} M82 {% endif %}
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}  
  RESUME_BASE {get_params}


[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
description: Отмена печати с безопасной парковкой
gcode:
    {% if printer.pause_resume.is_paused|lower == 'false' %}
        PAUSE
    {% endif %}

    SAVE_GCODE_STATE NAME=CANCEL_state

    # Получаем минимальную температуру экструдера из конфига (с запасным значением 170)
    {% set min_extrude_temp = printer.configfile.settings.extruder.min_extrude_temp|default(170) %}

    # Откат филамента ТОЛЬКО если экструдер горячий
    {% if printer.extruder.temperature >= min_extrude_temp %}
        G91
        G1 E-8 F2100
        G90
    {% else %}
        {action_respond_info("Extruder too cold (" ~ printer.extruder.temperature|int ~ "°C < " ~ min_extrude_temp|int ~ "°C) - skipping retraction")}
    {% endif %}

    # Получаем состояние осей
    {% set HOMED = printer.toolhead.homed_axes|lower %}

    # Подъём Z если возможно
    {% if 'z' in HOMED %}
        G91
        G1 Z5 F900
        G90
    {% endif %}

    # Попытка парковки
    {% if 'x' in HOMED and 'y' in HOMED %}
        G90
        G1 X10 Y{printer.toolhead.axis_maximum.y|float - 15} F1500
    {% else %}
        {% if 'x' in HOMED %}
            G90
            G1 X10 F1500
        {% endif %}
        {% if 'y' in HOMED %}
            G90
            G1 Y{printer.toolhead.axis_maximum.y|float - 15} F1500
        {% endif %}
    {% endif %}

    M106 S0
    BASE_CANCEL_PRINT
    TURN_OFF_HEATERS
    RESTORE_GCODE_STATE NAME=CANCEL_state

[gcode_macro _TOOLHEAD_PARK_PAUSE_CANCEL]
description: Helper: park toolhead used in PAUSE and CANCEL_PRINT
variable_extrude: 1.0
gcode:
  ##### set park positon for x and y #####
  # default is your max posion from your printer.cfg
  {% set x_park = printer.toolhead.axis_minimum.x|float + 10.0 %}
  {% set y_park = printer.toolhead.axis_minimum.y|float + 10.0 %}
  {% set z_park_delta = 2.0 %}
  ##### calculate save lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - z_park_delta) %}
    {% set z_safe = z_park_delta %}
  {% else %}
    {% set z_safe = max_z - act_z %}
  {% endif %}
  ##### end of definitions #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    M83
    G1 E-{extrude} F2100
    {% if printer.gcode_move.absolute_extrude |lower == 'true' %} M82 {% endif %}
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G91
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F6000
    {% if printer.gcode_move.absolute_coordinates|lower == 'false' %} G91 {% endif %}
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}
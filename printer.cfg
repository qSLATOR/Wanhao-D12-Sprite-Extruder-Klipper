[include mainsail.cfg]

[include KAMP_Settings.cfg]
[include KAMP/Adaptive_Meshing.cfg]
[include KAMP/Line_Purge.cfg]  
[exclude_object]

[mcu]
serial: /dev/ttyS0
baud: 250000
restart_method: command

[stepper_x]
step_pin: gpio11
dir_pin: gpio10
enable_pin: !gpio12
microsteps: 16
rotation_distance: 40
endstop_pin: !gpio4
position_endstop: -19      # Концевик в X=0
position_max: 314
position_min: -19          # Минимум = position_endstop
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 0
run_current: 0.8
hold_current: 0.6
interpolate: true
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_y]
step_pin: gpio6
dir_pin: !gpio5
enable_pin: !gpio7
microsteps: 16
rotation_distance: 40
endstop_pin: !gpio3
position_endstop: -17      # Концевик в Y=0
position_max: 295        # Макс движение  
position_min: -17          # Минимум = position_endstop
homing_speed: 50


[tmc2209 stepper_y]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 2
run_current: 0.9
hold_current: 0.6
interpolate: true
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z]
step_pin: gpio19
dir_pin: gpio28
enable_pin: !gpio2
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -10   
position_max: 350


[tmc2209 stepper_z]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 1
run_current: 0.8
hold_current: 0.5
interpolate: True
stealthchop_threshold: 999999  #тихо

[extruder]
step_pin: gpio14
dir_pin: !gpio13
enable_pin: !gpio15
microsteps: 16
rotation_distance: 7.6190
nozzle_diameter: 0.4
filament_diameter: 1.75
heater_pin: gpio23
sensor_type: EPCOS 100K B57560G104F
sensor_pin: gpio27
control: pid
pid_Kp: 21.761
pid_Ki: 1.261
pid_Kd: 93.844
max_extrude_cross_section: 5.0
min_temp: 0
max_temp: 320  # Sprite может до 300°C
max_power: 1.0

[tmc2209 extruder]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 3
run_current: 0.75
hold_current: 0.45
stealthchop_threshold: 999999
interpolate: True
sense_resistor: 0.110

[filament_switch_sensor runout_sensor]
switch_pin: ^gpio16
pause_on_runout: True
runout_gcode: PAUSE
# insert_gcode: RESUME

# [filament_motion_sensor smart_sensor]
# switch_pin: ^gpio16
# detection_length: 2.5

[heater_bed]
heater_pin: gpio21
sensor_type: EPCOS 100K B57560G104F
sensor_pin: gpio26
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

[fan]  # Вентилятор охлаждения модели
pin: gpio17
max_power: 1.0
kick_start_time: 0.5
off_below: 0.0
cycle_time: 0.010

[heater_fan hotend_fan]  # Вентилятор охлаждения хотенда
pin: gpio18
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 60.0
fan_speed: 1.0

[temperature_sensor pico]
sensor_type: temperature_mcu

[neopixel board_rgb]
pin: gpio24
chain_count: 1
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0

[bltouch]
sensor_pin: ^gpio22
control_pin: gpio29
x_offset: -31
y_offset: -40
#z_offset: 0.0  # Для поздний калибровки
speed: 10
samples: 3
samples_result: median
sample_retract_dist: 3.0
probe_with_touch_mode: true  # Включить!
stow_on_each_sample: false   # Не убирать щуп каждый 

[bed_mesh]
speed: 100
horizontal_move_z: 10
mesh_min: 20, 20
mesh_max: 275, 255
probe_count: 8,8         # 25 точек
algorithm: bicubic
bicubic_tension: 0.2
fade_start: 1.0
fade_end: 10.0
fade_target: 0

[printer]
kinematics: cartesian
max_velocity: 500
square_corner_velocity: 8.0
max_accel: 2000
max_z_velocity: 25
max_z_accel: 100

[input_shaper]
damping_ratio_x: 0.055
damping_ratio_y: 0.055
shaper_type: mzv   # Или ei, zv — по тесту
shaper_freq_x: 26.2
shaper_freq_y: 42.5

[safe_z_home]
home_xy_position: 179, 179  # Центр реального стола: X=(314/2)-19=138
speed: 50.0
z_hop: 10
z_hop_speed: 15


[display_status]

[pause_resume]

[gcode_macro PRINT_END]
gcode:
    M400
    G91
    G1 E-5 F2000
    G1 Z5 F900
    G90
    G1 X10 Y{printer.toolhead.axis_maximum.y|float - 10} F8000
    M104 S0
    M140 S0
    M84
    M117 Готово!

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
description: Отмена печати с безопасной парковкой и без потери homing
gcode:
    {% if printer.pause_resume.is_paused|lower == 'false' %}
        PAUSE                           ; сначала пауза, если не была
    {% endif %}

    SAVE_GCODE_STATE NAME=CANCEL_state

    # Всегда откат филамента (относительно — безопасно даже без homing)
    G91
    G1 E-8 F2100
    G90

    # Проверяем, что homed
    {% set HOMED = printer.toolhead.homed_axes|lower %}

    # Подъём Z только если Z был homed
    {% if 'z' in HOMED %}
        G91
        G1 Z5 F900
        G90
    {% endif %}

    # Парковка
    {% if 'x' in HOMED and 'y' in HOMED %}
        # Уже homed → паркуемся
        G90
        G1 X10 Y{printer.toolhead.axis_maximum.y|float - 15} F1500
    {% else %}
        # Не homed → быстро homing только X и Y
        G28 X Y
        G90
        G1 X10 Y{printer.toolhead.axis_maximum.y|float - 15} F1500
    {% endif %}

    M106 S0                  ; выключаем обдув

    # Отмена состояния печати
    BASE_CANCEL_PRINT

    # Выключаем нагревы
    TURN_OFF_HEATERS



[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    SAVE_GCODE_STATE NAME=PAUSE_state

    BASE_PAUSE

    G91
    G1 E-4 F2000
    G90

    {% set HOMED = printer.toolhead.homed_axes|lower %}

    {% if 'z' in HOMED %}
        G91
        G1 Z10 F900
        G90
    {% endif %}

    {% if 'x' in HOMED and 'y' in HOMED %}
        G90
        G1 X5 Y{printer.toolhead.axis_maximum.y|float - 5} F6000
    {% else %}
        # Если не homed — делаем homing X Y и потом паркуем
        G28 X Y
        G90
        G1 X5 Y{printer.toolhead.axis_maximum.y|float - 5} F6000
    {% endif %}


[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    ##### можно указать сколько выдавить при возобновлении (по умолчанию 1 мм) #####
    {% set E = params.E|default(1.0)|float %}
    
    G91
    G1 E{E} F2000                  ; прайминг
    G90
    
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1 MOVE_SPEED=100
    
    BASE_RESUME


[gcode_macro CALIBRATE_Z_OFFSET]
description: Безопасная калибровка Z-offset с homing и центром
gcode:
    # Полный homing (X Y Z)
    G28

    # Подъём на безопасную высоту
    G91
    G1 Z15 F900
    G90

    # Переезд в центр (твои координаты)
    G1 X181 Y190 Z30 F5000

    M140 S90
    M104 S260

    M190 S90
    M109 S260

    # Запуск калибровки
    PROBE_CALIBRATE


